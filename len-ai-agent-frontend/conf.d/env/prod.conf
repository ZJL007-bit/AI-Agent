# 生产环境 API 代理配置
# 用于本地开发环境

location ^~ /api/ {
    # 后端 API 地址（本地开发）
    proxy_pass http://127.0.0.1:8102/api/;
    
    # ----------------------------------------
    # 请求头设置
    # ----------------------------------------
    
    # 传递原始 Host 头到后端
    proxy_set_header Host 127.0.0.1;
    
    # 获取客户端真实 IP
    proxy_set_header X-Real-IP $remote_addr;
    
    # 获取代理链路中的所有 IP
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    
    # 传递原始协议（http/https）
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # ----------------------------------------
    # SSE (Server-Sent Events) 长连接配置
    # 用于流式响应、AI对话等场景
    # ----------------------------------------
    
    # 保持连接打开，不自动关闭
    proxy_set_header Connection "";
    
    # 使用 HTTP 1.1（支持长连接）
    proxy_http_version 1.1;
    
    # 关闭缓冲，实时推送数据
    proxy_buffering off;
    
    # 关闭代理缓存
    proxy_cache off;
    
    # 关闭分块编码
    chunked_transfer_encoding off;
    
    # 读取超时时间（10分钟），适用于长对话
    proxy_read_timeout 600s;
    
    # ----------------------------------------
    # 调试配置
    # ----------------------------------------
    
    # 显示后端返回的真实错误信息
    proxy_intercept_errors off;
}