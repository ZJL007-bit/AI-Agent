server
{
    listen 80;
    listen 443 ssl http2;
    server_name agent.zeng.click 120.78.235.124;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/agent.zeng.click;

    #SSL证书配置
    ssl_certificate /www/server/panel/vhost/cert/agent.zeng.click/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/agent.zeng.click/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/agent.zeng.click.conf;
    #CERT-APPLY-CHECK--END
    include /www/server/panel/vhost/nginx/extension/agent.zeng.click/*.conf;

    #ERROR-PAGE-START
    error_page 404 /404.html;
    #ERROR-PAGE-END

    #PHP-INFO-START
    include enable-php-00.conf;
    #PHP-INFO-END

    #REWRITE-START
    include /www/server/panel/vhost/rewrite/agent.zeng.click.conf;
    #REWRITE-END

    # Vue Router history 模式 - 解决前端路由404问题
    location / {
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # API 反向代理配置
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8102/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 600s;
    }

    # 禁止访问的敏感文件
    location ~* (\.user.ini|\.htaccess|\.htpasswd|\.env.*|\.project|\.bashrc|\.bash_profile|\.bash_logout|\.DS_Store|\.gitignore|\.gitattributes|LICENSE|README\.md|CLAUDE\.md|CHANGELOG\.md|CHANGELOG|CONTRIBUTING\.md|TODO\.md|FAQ\.md|composer\.json|composer\.lock|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|\.\w+~|\.swp|\.swo|\.bak(up)?|\.old|\.tmp|\.temp|\.log|\.sql(\.gz)?|docker-compose\.yml|docker\.env|Dockerfile|\.csproj|\.sln|Cargo\.toml|Cargo\.lock|go\.mod|go\.sum|phpunit\.xml|phpunit\.xml|pom\.xml|build\.gradl|pyproject\.toml|requirements\.txt|application(-\w+)?\.(ya?ml|properties))$
    {
        return 404;
    }

    # 禁止访问的敏感目录
    location ~* /(\.git|\.svn|\.bzr|\.vscode|\.claude|\.idea|\.ssh|\.github|\.npm|\.yarn|\.pnpm|\.cache|\.husky|\.turbo|\.next|\.nuxt|node_modules|runtime)/ {
        return 404;
    }

    location ~ \.well-known{
        allow all;
    }

    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires      30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    location ~ .*\.(js|css)?$
    {
        expires      12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    access_log  /www/wwwlogs/agent.zeng.click.log;
    error_log  /www/wwwlogs/agent.zeng.click.error.log;
}