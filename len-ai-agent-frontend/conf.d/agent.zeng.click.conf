# Nginx 主配置文件
# 用于 Vue 项目，支持多环境配置

server {
    # 监听端口
    listen       80;
    
    # 服务器名称（可以是域名或localhost）
    server_name  localhost;
    
    # 前端静态文件根目录（Docker中映射的目录）
    root   /usr/share/nginx/html;

    # ----------------------------------------
    # Vue Router history 模式配置
    # 所有HTML请求都返回 index.html，解决Vue路由404问题
    # ----------------------------------------
    location / {
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # ----------------------------------------
    # 动态引入环境配置
    # 根据 NGINX_ENV 环境变量加载对应的配置文件
    # 示例: docker run -e NGINX_ENV=prod
    # ----------------------------------------
    include /etc/nginx/conf.d/env/${NGINX_ENV}.conf;

    # ----------------------------------------
    # 静态资源缓存配置
    # 匹配: js, css, images, fonts 等
    # ----------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        # 缓存时间: 1年
        expires 1y;
        
        # 关闭静态资源访问日志，减少IO
        access_log off;
        
        # 添加缓存头，标记为公共缓存
        add_header Cache-Control "public";
    }

    # ----------------------------------------
    # 错误页面配置
    # ----------------------------------------
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}